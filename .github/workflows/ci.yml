name: PygqlClient [CI]

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Testing with pytest
        env:
          API: ${{ secrets.API }}
          WSS: ${{ secrets.WSS }}
          TOKEN: ${{ secrets.TOKEN }}
        run: uv run pytest
